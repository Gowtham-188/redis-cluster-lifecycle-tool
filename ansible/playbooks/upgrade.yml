---
- name: Rolling Upgrade Redis Cluster
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Pre-flight check
      debug:
        msg: "Checking cluster health"

    - name: Upgrade replicas
      debug:
        msg: "Upgrading replicas"

    - name: Upgrade masters
      debug:
        msg: "Upgrading masters"

    - name: Post verification
      debug:

        msg: "Upgrade completed"
